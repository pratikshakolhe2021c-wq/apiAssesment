server:
  port: 8084

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: student-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/students/**
        - id: fee-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/fee/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,circuitbreakers
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - url: /api-docs
        name: API Gateway
        description: Gateway API Documentation

logging:
  level:
    com.assesment.apigateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
