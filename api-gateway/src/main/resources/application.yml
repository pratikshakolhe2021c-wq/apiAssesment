server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: student-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/students/**
          filters:
            - name: CircuitBreaker
              args:
                name: studentService
                fallbackUri: forward:/fallback/students
        - id: fee-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/fee/**
          filters:
            - name: CircuitBreaker
              args:
                name: feeService
                fallbackUri: forward:/fallback/fee
      default-filters:
        - AddResponseHeader=X-Response-Time, ${T(java.time.Instant).now().toString()}
        - AddResponseHeader=Gateway, API-Gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,circuitbreakers
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - url: /api-docs
        name: API Gateway
        description: Gateway API Documentation

logging:
  level:
    com.assesment.apigateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
