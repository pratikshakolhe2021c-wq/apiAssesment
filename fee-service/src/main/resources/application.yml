server:
  port: 8082

spring:
  application:
    name: fee-service
  datasource:
    url: jdbc:h2:mem:feedb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

student-service:
  url: http://localhost:8081

feign:
  client:
    config:
      student-service:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.assesment.feeservice: DEBUG
    com.assesment.feeservice.client: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: DEBUG
